name: Backend Tests

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXPO_BACKEND_URL: http://127.0.0.1:8001
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      APP_PUBLIC_URL: http://127.0.0.1:8001
      ALLOWED_ORIGINS: http://127.0.0.1:8001
      INVITE_EMAIL_DELIVERY: disabled

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Validate test environment
        run: |
          python - <<'PY'
          import os
          missing = [name for name in ("SUPABASE_URL", "SUPABASE_ANON_KEY", "SUPABASE_SERVICE_ROLE_KEY") if not os.getenv(name)]
          if missing:
              raise SystemExit(f"Missing required backend test secrets: {', '.join(missing)}")
          PY

      - name: Start backend server
        run: |
          python -m uvicorn backend.server:app --host 127.0.0.1 --port 8001 > backend-server.log 2>&1 &
          echo $! > backend-server.pid
          python - <<'PY'
          import sys
          import time
          import requests

          for _ in range(30):
              try:
                  response = requests.get("http://127.0.0.1:8001/api/health", timeout=2)
                  if response.status_code == 200:
                      sys.exit(0)
              except requests.RequestException:
                  pass
              time.sleep(1)

          raise SystemExit("Backend server did not become healthy")
          PY

      - name: Run backend pytest
        run: pytest backend/tests --junitxml=test_reports/backend_pytest_results.xml

      - name: Show backend logs
        if: always()
        run: cat backend-server.log || true

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-results
          path: test_reports/backend_pytest_results.xml
