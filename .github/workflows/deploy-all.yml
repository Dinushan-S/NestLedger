name: Deploy All

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 10m
          script: |
            export DEBIAN_FRONTEND=noninteractive

            if [ ! -d /opt/NestLedger/.git ]; then
              echo "=== First-time setup ==="
              apt-get update -qq
              apt-get install -y -qq python3.11 python3.11-venv python3-pip git nginx certbot python3-certbot-nginx

              git clone https://github.com/Dinushan-S/NestLedger.git /opt/NestLedger
              cd /opt/NestLedger/backend
              python3.11 -m venv venv
              source venv/bin/activate
              pip install -r requirements.txt

              cat > /etc/systemd/system/nestledger.service << 'SVCEOF'
            [Unit]
            Description=NestLedger FastAPI Backend
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=/opt/NestLedger/backend
            Environment="PATH=/opt/NestLedger/backend/venv/bin"
            ExecStart=/opt/NestLedger/backend/venv/bin/uvicorn server:app --host 0.0.0.0 --port 8000
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            SVCEOF

              systemctl daemon-reload
              systemctl enable nestledger

              cat > /etc/nginx/sites-available/nestledger << 'NGXEOF'
            server {
                listen 80;
                server_name nestledger.dinushan.dev;

                location / {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
            }
            NGXEOF

              ln -sf /etc/nginx/sites-available/nestledger /etc/nginx/sites-enabled/
              rm -f /etc/nginx/sites-enabled/default
              nginx -t && systemctl restart nginx

              certbot --nginx -d nestledger.dinushan.dev --non-interactive --agree-tos --register-unsafely-without-email || true

              echo "=== First-time setup complete ==="
            fi

            cd /opt/NestLedger
            git fetch origin
            git reset --hard origin/main

            cd backend

            cat > .env << 'ENVEOF'
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            APP_PUBLIC_URL=${{ secrets.APP_PUBLIC_URL }}
            BREVO_FROM_NAME=NestLedger
            BREVO_FROM_EMAIL=${{ vars.BREVO_FROM_EMAIL }}
            SMTP_HOST=${{ vars.SMTP_HOST }}
            SMTP_PORT=587
            SMTP_LOGIN=${{ secrets.SMTP_LOGIN }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            ENVEOF

            source venv/bin/activate
            pip install -r requirements.txt

            systemctl restart nestledger
            sleep 5
            systemctl status nestledger --no-pager
            
      - name: Health Check
        run: |
          sleep 15
          curl -f https://nestledger.dinushan.dev/api/health || exit 1
          
      - name: Backend Deployed
        run: echo "Backend deployed to https://nestledger.dinushan.dev"

  build-android:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          
      - name: Install dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile
        
      - name: Build Android App (.aab)
        working-directory: ./frontend
        run: eas build --platform android --profile production --non-interactive
        
      - name: Build Complete
        run: echo "✅ Android .aab build submitted to EAS"

  notify:
    needs: [changes, deploy-backend, build-android]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.changes.outputs.backend }}" == "true" ]; then
            echo "| Backend | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.changes.outputs.frontend }}" == "true" ]; then
            echo "| Frontend | ${{ needs.build-android.result }} |" >> $GITHUB_STEP_SUMMARY
          fi