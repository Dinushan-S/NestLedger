name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to Contabo Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          port: 22
          script: |
            # Pull latest code
            cd /opt/NestLedger
            git fetch origin
            git reset --hard origin/main
            
            cd backend
            source venv/bin/activate
            pip install -r requirements.txt
            
            # Restart service
            systemctl restart nestledger
            sleep 5
            systemctl status nestledger --no-pager
            
      - name: Health Check
        run: |
          sleep 15
          curl -f http://185.216.75.254:8000/api/health || exit 1
          
      - name: Deployment Complete
        run: |
          echo "✅ Backend deployed successfully!"
          echo "API URL: http://185.216.75.254:8000"