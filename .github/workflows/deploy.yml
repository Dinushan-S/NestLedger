name: Deploy to Contabo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to Contabo Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          port: 22
          script: |
            # Check if directory exists, clone if not
            if [ ! -d "/opt/NestLedger" ]; then
              echo "=== Initial Setup ==="
              apt update
              apt install -y python3 python3-venv python3-pip python3-full git
              cd /opt
              git clone https://github.com/${{ github.repository }}.git NestLedger
              cd NestLedger/backend
              python3 -m venv venv
              source venv/bin/activate
              pip install -r requirements.txt
            
              # Create systemd service
              cat > /etc/systemd/system/nestledger.service << 'EOFSERVICE'
            [Unit]
            Description=NestLedger FastAPI Backend
            After=network.target
            
            [Service]
            Type=simple
            User=root
            WorkingDirectory=/opt/NestLedger/backend
            Environment="PATH=/opt/NestLedger/backend/venv/bin"
            ExecStart=/opt/NestLedger/backend/venv/bin/uvicorn server:app --host 0.0.0.0 --port 8000
            Restart=always
            RestartSec=10
            
            [Install]
            WantedBy=multi-user.target
            EOFSERVICE
            
              systemctl daemon-reload
              systemctl enable nestledger
              ufw allow 8000/tcp
            fi
            
            # Pull latest code
            cd /opt/NestLedger
            git fetch origin
            git reset --hard origin/main
            
            # Update .env file from ENV secret
            cd backend
            echo "${{ secrets.ENV }}" > .env
            
            # Install dependencies
            source venv/bin/activate
            pip install -r requirements.txt
            
            # Restart service
            systemctl restart nestledger
            sleep 5
            systemctl status nestledger --no-pager
            
      - name: Health Check
        run: |
          sleep 15
          curl -f http://185.216.75.254:8000/api/health || exit 1
          
      - name: Deployment Complete
        run: |
          echo "Deployed successfully!"
          echo "API URL: http://185.216.75.254:8000"